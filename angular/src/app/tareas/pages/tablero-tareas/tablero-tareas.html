<header class="tablero-header" id="encabezado">
  <h1 class="tablero-titulo m-0">
    <img class="tablero-logo" src="/assets/images/logo-inetel.png" alt="Logo INETEL">
    <span>Tablero de tareas</span>
  </h1>
  <button class="btn btn-primary btn-sm tablero-boton-crear" (click)="crearTarea()">
    <i class="bi bi-plus-lg"></i>
    Crear tarea
  </button>
</header>
<div class="row mt-4">
  @for (estado of this.estados; track estado) {
    <div class="col columna px-3">
      <div class="d-flex align-items-center mb-3 mt-2 encabezado-columna">
        <span class="marcador-estado rounded-circle bg-{{ESTADO_TAREA_COLORES[estado]}}"></span>
        <h4 class="m-0">{{ ESTADO_TAREA_LABELS[estado] }}</h4>
        <span class="badge-numero-tareas rounded-circle bg-primary">{{this.tareasAgrupadasPorEstado()[estado].length}}</span>
      </div>
      @for (tarea of this.tareasAgrupadasPorEstado()[estado]; track tarea.id) {
        <app-preview-tarea [tarea]="tarea" (eventoClick)="abrirModalTarea($event)"></app-preview-tarea>
      }
    </div>
  }
</div>

<app-modal-tarea
  #modalTarea
  [usuarios]="usuarios"
  (guardarEvent)="guardarTarea($event)"
  (agregarComentarioEvent)="agregarComentario($event)"
  (editarEvent)="editarDesdeDetalle($event)"
  (eliminarEvent)="eliminarTarea($event)">
</app-modal-tarea>
