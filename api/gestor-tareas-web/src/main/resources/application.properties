spring.datasource.url=jdbc:postgresql://${DB_HOST:bdd}:${DB_PORT:5432}/${DB_NAME:gestortareas}
spring.datasource.username=${DB_USER:gestortareas}
spring.datasource.password=${DB_PASSWORD:gestortareas}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=8080
